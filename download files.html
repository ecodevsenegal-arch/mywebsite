<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Téléchargement de fichiers</title>
    <style>
    .resources-section { padding:16px 28px 28px; border-top:1px solid var(--border);margin-top:16px; }
  .resources-section h4 { font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:14px; }
  .resource-list { display:flex;flex-direction:column;gap:8px; }
  .resource-item {
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .2s;
  }
  .resource-item:hover { border-color:var(--accent);background:rgba(0,201,167,0.06); }
  .resource-item i { color:var(--accent);font-size:1rem; }
  .resource-item span { font-size:.85rem; flex:1; }
  .resource-item .res-size { font-size:.75rem;color:var(--text-muted); }

</style>
</head>

<body>
    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
    <!-- Resources -->
    <h1>Télécharger vos fichiers</h1>
      <div class="resources-section">
        <h4><i class="fas fa-paperclip" style="color:var(--accent);margin-right:8px;"></i>Ressources de la leçon</h4>
        <div class="resource-list" id="resourceList">
          <div class="resource-item">
            <i class="fas fa-file-pdf"></i>
    <span onclick="telecharger('https://drive.google.com/uc?export=download&id=19Hbll4TAXp3s8tfUhlVecxfMeJJ1Mb_v', 'Document-1.pdf')">
        Support de cours – Leçon 1
    </span>
     <span class="res-size">2.4 MB</span>
            <i class="fas fa-download" style="color:var(--text-muted);font-size:.85rem;"></i>
          </div>
          <div class="resource-item">
            <i class="fas fa-file-excel" style="color:#1d9a4c;"></i>
    <span onclick="telecharger('https://docs.google.com/spreadsheets/d/1u8aDMkFl-YSOP-7j1TXITyB61c7kPt2i/edit?usp=drive_link&ouid=115956588205778948101&rtpof=true&sd=true', 'Archive-2.zip')">
        Fichier exercice pratique
    </span>
    <span class="res-size">1.1 MB</span>
            <i class="fas fa-download" style="color:var(--text-muted);font-size:.85rem;"></i>
          </div>
        </div>
      </div>

    <script>
        function telecharger(url, nomFichier) {
            const lien = document.createElement('a');
            lien.href = url;
            lien.download = nomFichier;
            document.body.appendChild(lien);
            lien.click();
            document.body.removeChild(lien);
        }
    </script>
</body>
</html>
